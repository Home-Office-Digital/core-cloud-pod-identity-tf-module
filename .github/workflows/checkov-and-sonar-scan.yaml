name: Checkov and SonarQube Scan

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
  workflow_dispatch: {}  # to allow manual runs if needed

permissions:
  actions: read
  contents: read
  id-token: write
  security-events: write

jobs:
  checkov-scan:
    uses: Home-Office-Digital/core-cloud-workflow-checkov-sast-scan/.github/workflows/checkov-scan-base.yaml@f514754d452759b473de7221f084ad11ab686cd8 #1.12.0

  sonarqube-scanner:
    uses: Home-Office-Digital/core-cloud-workflow-sonarqube-scan/.github/workflows/sonarqube-scan.yaml@6338df7443d336b94e90ff8c71fba9ed258b1654 #1.1.7
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      sonar_host_url: ${{ secrets.SONAR_HOST_URL }}
